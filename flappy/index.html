<script>
let soundOn = true;
function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById("toggleSound");
  btn.textContent = soundOn ? "🔊 SOUND ON" : "🔇 SOUND OFF";
  btn.classList.toggle("active", soundOn);
}
document.getElementById("toggleSound").addEventListener("click", toggleSound);

class FlappyScene extends Phaser.Scene {
  constructor(){ super("FlappyScene"); }
 
  preload(){
    this.load.image("bg",    "assets/background.png");
    this.load.image("ground","assets/ground.png");
    this.load.image("cloud", "assets/cloud.png");
    this.load.image("pipe",  "assets/pipe.png");
    this.load.audio('jumpSound', 'assets/jumpSound.wav');
    for(let i=1; i<=6; i++){
      this.load.image("bird"+i, "assets/bird"+i+".png");
    }
  }
 
  create(){
    const W = 400, H = 600;
    
    this.gameOver     = false;
    this.gameStarted  = false;
    this.score        = 0;
    this.highScore    = localStorage.getItem("flappyHigh") || 0;
    this.pipeInterval = 1500;
    this.gap          = 130;
    this.pipeSpeed    = 240;
    this.bgSpeed      = 20;
    this.flapSfx      = this.sound.add('jumpSound');
    this.difficultyUpdated = false;
    this.pipeTimer    = 0;
    this.lastGapY     = null;
 
    // Sky
    this.add.rectangle(W/2, H/2, W, H, 0x70c5ce).setDepth(0);
 
    // Background
    this.bg = this.add.tileSprite(W/2, H/2 + 100, W, H, "bg").setDepth(1);
 
    // Clouds
    this.clouds = [];
    for(let i = 0; i < 3; i++){
      let cloud = this.add.image(
        Phaser.Math.Between(50, 300),
        Phaser.Math.Between(50, 150),
        "cloud"
      ).setDepth(2);
      cloud.speed = Phaser.Math.Between(30, 70);
      this.clouds.push(cloud);
    }
 
    // Bird
    this.bird = this.physics.add.sprite(80, 200, "bird1").setDepth(6);
    this.bird.setScale(0.55, 0.55);
    this.bird.body.gravity.y = 0;
    this.bird.body.setSize(this.bird.width * 0.45, this.bird.height * 0.45);
    this.bird.body.setOffset(this.bird.width * 0.275, this.bird.height * 0.275);
 
    this.lift = -500;
 
    // Bird animation
    this.birdFrame = 1;
    this.time.addEvent({
      delay: 80, loop: true,
      callback: () => {
        this.birdFrame = this.birdFrame >= 6 ? 1 : this.birdFrame + 1;
        this.bird.setTexture("bird" + this.birdFrame);
      }
    });
 
    // Bird bobbing on start screen
    this.birdTween = this.tweens.add({
      targets: this.bird,
      y: 195,
      duration: 700,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });
 
    // ── START SCREEN ──
    this.overlay = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.65).setDepth(30);
 
    this.add.text(W/2, H/2 - 90, "🐦 FLAPPY BIRD", {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "26px",
      color: "#ffe259",
      stroke: "#000",
      strokeThickness: 6
    }).setOrigin(0.5).setDepth(31);
 
    this.add.text(W/2, H/2 - 25, "Tap or press SPACE\nto flap your wings!", {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "11px",
      color: "#38bdf8",
      stroke: "#000",
      strokeThickness: 3,
      align: "center"
    }).setOrigin(0.5).setDepth(31);
 
    this.startPrompt = this.add.text(W/2, H/2 + 65, "PRESS SPACE\nOR TAP TO START", {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "12px",
      color: "#ffffff",
      stroke: "#000",
      strokeThickness: 4,
      align: "center"
    }).setOrigin(0.5).setDepth(31);
 
    // Input
    this.input.keyboard.on("keydown-SPACE", () => this.handleInput());
    this.input.on("pointerdown", () => this.handleInput());
 
    // Ground
    this.ground = this.add.tileSprite(W/2, H - 50, W, 100, "ground").setDepth(10);
 
    const groundBody = this.physics.add.staticImage(W/2, H - 16, null);
    groundBody.setVisible(false);
    groundBody.body.setSize(W, 32);
    this.physics.add.collider(this.bird, groundBody, () => this.endGame());
 
    // Pipes
    this.pipeGroup = this.add.group();
 
    // Score UI
    this.scoreText = this.add.text(10, 10, "Score: 0", {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "14px",
      color: "#fff",
      stroke: "#000",
      strokeThickness: 4
    }).setDepth(20).setVisible(false);
 
    this.bestText = this.add.text(10, 36, "Best: " + this.highScore, {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "11px",
      color: "#ffe259",
      stroke: "#000",
      strokeThickness: 3
    }).setDepth(20);
  }
 
  handleInput() {
    if (!this.gameStarted) {
      this.startGame();
    } else if (this.gameOver) {
      this.scene.restart();
    } else {
      this.flap();
    }
  }
 
  startGame() {
    if (this.gameStarted) return;
    this.gameStarted = true;
 
    if (this.overlay) this.overlay.destroy();
    if (this.startPrompt) this.startPrompt.destroy();
    this.children.list.filter(c => c.depth === 31).forEach(c => c.destroy());
 
    if (this.birdTween) this.birdTween.stop();
 
    this.bird.body.gravity.y = 1800;
    this.scoreText.setVisible(true);
  }
 
  flap() {
    if (!this.gameStarted || this.gameOver) return;
    this.bird.body.velocity.y = this.lift;
    if (soundOn) this.flapSfx.play();
  }
 
  createPipe() {
    const PIPE_W = 52;
    const PIPE_H = 640;
    const gap = this.gap;
 
    let gapCenterY;
    do {
      gapCenterY = Phaser.Math.Between(80, 420);
    } while (this.lastGapY !== null && Math.abs(gapCenterY - this.lastGapY) < 70);
 
    this.lastGapY = gapCenterY;
    const spawnX = 450;
 
    const bp = this.physics.add.image(spawnX, gapCenterY + gap/2, "pipe");
    bp.setOrigin(0.5, 0);
    bp.setDisplaySize(PIPE_W, PIPE_H);
    bp.body.setSize(bp.width, bp.height);
    bp.body.allowGravity = false;
    bp.body.immovable = true;
    bp.body.velocity.x = -this.pipeSpeed;
    bp.isScorePipe = false;
    bp.setDepth(5);
 
    const tp = this.physics.add.image(spawnX, gapCenterY - gap/2 - PIPE_H, "pipe");
    tp.setOrigin(0.5, 0);
    tp.setFlipY(true);
    tp.setDisplaySize(PIPE_W, PIPE_H);
    tp.body.setSize(tp.width, tp.height);
    tp.body.allowGravity = false;
    tp.body.immovable = true;
    tp.body.velocity.x = -this.pipeSpeed;
    tp.passed = false;
    tp.isScorePipe = true;
    tp.setDepth(5);
 
    this.pipeGroup.add(bp);
    this.pipeGroup.add(tp);
 
    this.physics.add.collider(this.bird, bp, () => this.endGame());
    this.physics.add.collider(this.bird, tp, () => this.endGame());
  }
 
  update(time, delta){
    if (this.gameOver) return;
 
    const dt = delta / 1000;
 
    this.bg.tilePositionX += this.bgSpeed * dt;
    this.ground.tilePositionX += this.pipeSpeed * dt;
 
    this.clouds.forEach(c => {
      c.x -= c.speed * dt;
      if (c.x < -60){
        c.x = 460;
        c.y = Phaser.Math.Between(50, 250);
        c.speed = Phaser.Math.Between(20, 50);
      }
    });
 
    if (!this.gameStarted) return;
 
    if (this.score % 10 === 0 && this.score !== 0 && !this.difficultyUpdated){
      this.pipeSpeed = Math.min(this.pipeSpeed + 40, 480);
      this.pipeInterval = Math.max(1500 - 200*(this.score/10), 600);
      this.gap = Math.max(130 - 5*(this.score/10), 100);
      this.difficultyUpdated = true;
      this.pipeGroup.getChildren().forEach(pipe => {
        if (pipe.body) pipe.body.velocity.x = -this.pipeSpeed;
      });
    }
    if (this.score % 10 !== 0) this.difficultyUpdated = false;
 
    this.pipeTimer += delta;
    if (this.pipeTimer > this.pipeInterval){
      this.createPipe();
      this.pipeTimer = 0;
    }
 
    this.pipeGroup.getChildren().forEach(pipe => {
      if (pipe.isScorePipe && !pipe.passed && pipe.x < this.bird.x){
        pipe.passed = true;
        this.score++;
        this.scoreText.setText("Score: " + this.score);
      }
      if (pipe.x < -100) pipe.destroy();
    });
 
    if (this.bird.y < 0 || this.bird.y > 485){
      this.endGame();
    }
 
    if (this.score > this.highScore){
      this.highScore = this.score;
      localStorage.setItem("flappyHigh", this.highScore);
      this.bestText.setText("Best:  " + this.highScore);
    }
  }
 
  endGame(){
    if (this.gameOver) return;
    this.gameOver = true;
 
    this.pipeGroup.getChildren().forEach(p => {
      if (p.body) p.body.velocity.x = 0;
    });
 
    this.bird.body.velocity.y = 0;
    this.bird.body.velocity.x = 0;
    this.bird.body.gravity.y  = 0;
 
    const W = 400, H = 600;
    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.45).setDepth(30);
 
    this.add.text(W/2, H/2 - 50, "GAME OVER", {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "22px", color: "#ff4444",
      stroke: "#000", strokeThickness: 5
    }).setOrigin(0.5).setDepth(31);
 
    this.add.text(W/2, H/2 + 10, "Score: " + this.score, {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "14px", color: "#fff",
      stroke: "#000", strokeThickness: 3
    }).setOrigin(0.5).setDepth(31);
 
    this.add.text(W/2, H/2 + 60, "Tap to Restart", {
      fontFamily: "'Press Start 2P', monospace",
      fontSize: "11px", color: "#ffe259",
      stroke: "#000", strokeThickness: 3
    }).setOrigin(0.5).setDepth(31);
  }
}
 
const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 600,
  parent: "game-border",
  backgroundColor: "#70c5ce",
  physics: {
    default: "arcade",
    arcade: { debug: false }
  },
  scene: FlappyScene
};
 
new Phaser.Game(config);
</script>
